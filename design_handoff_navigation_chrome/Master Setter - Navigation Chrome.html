<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Master Setter — Navigation Chrome</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ms-bg: #07070a;
    --ms-bg-pure: #000;
    --ms-ink: #f4f4f6;
    --ms-dim: rgba(244,244,246,0.60);
    --ms-faint: rgba(244,244,246,0.36);
    --ms-rule: rgba(244,244,246,0.08);
    --ms-accent: #c8ff4a;
    --ms-accent-ink: #07070a;
    --ms-gold: #FFB830;
    --ms-danger: #ff5a6a;
  }
  html, body { margin: 0; background: #0a0a0d; color: #f4f4f6;
    font-family: "IBM Plex Sans", system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
  .upper { text-transform: uppercase; }
  /* meta = the signature uppercase mono label */
  .meta { font-family: "IBM Plex Mono", monospace; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#07070a"/>
    <g stroke="#c8ff4a" stroke-width="2" fill="none">
      <path d="M22 30 H32 M22 30 V40 M22 70 H32 M22 70 V60"/>
      <path d="M78 30 H68 M78 30 V40 M78 70 H68 M78 70 V60"/>
    </g>
    <text x="50" y="58" font-family="sans-serif" font-size="20" font-weight="700"
      text-anchor="middle" fill="#f4f4f6">MS</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="nav-chrome.jsx"></script>
<script type="text/babel">
const { Screen, IconSheet, ActiveIndicatorSheet, TabBarSheet } = window;

function App() {
  return (
    <DesignCanvas title="Master Setter — Navigation Chrome">

      <DCSection id="icons" title="01 · Icon options"
        subtitle="Pick one Sets glyph and one Discover glyph. All icons are 22px / 2px stroke / rounded joins, IBM Plex–compatible. They live in the bottom tab bar.">
        <DCArtboard id="sets-icons" label="Sets — 3 options" width={780} height={260}>
          <IconSheet
            title="SETS"
            options={[
              { id: 'stack',   label: 'Stacked cards', recommended: true },
              { id: 'grid',    label: '9-pocket grid' },
              { id: 'binder',  label: 'Binder spine' },
            ]}
            family="sets"
          />
        </DCArtboard>
        <DCArtboard id="discover-icons" label="Discover — 3 options" width={780} height={260}>
          <IconSheet
            title="DISCOVER"
            options={[
              { id: 'radar',   label: 'Radar sweep', recommended: true },
              { id: 'compass', label: 'Compass' },
              { id: 'spark',   label: 'Sparkle' },
            ]}
            family="discover"
          />
        </DCArtboard>
      </DCSection>

      <DCSection id="indicator" title="02 · Active-tab indicator"
        subtitle="The brand's bracket geometry shows up subtly in the chrome — a 2px lime line at the top of the active cell, with tiny inward corner notches. Three densities; recommend 'Bracket A'.">
        <DCArtboard id="indicator-options" label="Active indicator — 3 styles" width={780} height={220}>
          <ActiveIndicatorSheet/>
        </DCArtboard>
      </DCSection>

      <DCSection id="tabbar" title="03 · Bottom tab bar — full anatomy"
        subtitle="Iconography + bracket-notched active indicator, mono uppercase labels, safe-area handling.">
        <DCArtboard id="tabbar-detail" label="Tab bar · anatomy" width={780} height={300}>
          <TabBarSheet/>
        </DCArtboard>
      </DCSection>

      <DCSection id="screens" title="04 · In context · three screens"
        subtitle="iPhone 14 width (390px). Same chrome on all three. Page titles live in the page body — never in the top header.">
        <DCArtboard id="screen-sets" label="A · Sets tab active" width={390} height={844}>
          <Screen tab="sets" notifications={2}/>
        </DCArtboard>
        <DCArtboard id="screen-discover" label="B · Discover tab active" width={390} height={844}>
          <Screen tab="discover" notifications={2}/>
        </DCArtboard>
        <DCArtboard id="screen-you" label="C · You tab active" width={390} height={844}>
          <Screen tab="you" notifications={2}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="states" title="05 · Header states"
        subtitle="Notification dot, scroll-state border (drawn-in only when content scrolls beneath).">
        <DCArtboard id="header-rest" label="Header · rest state" width={780} height={140}>
          <Screen tab="sets" notifications={0} headerOnly/>
        </DCArtboard>
        <DCArtboard id="header-dot" label="Header · unread notification" width={780} height={140}>
          <Screen tab="sets" notifications={3} headerOnly/>
        </DCArtboard>
        <DCArtboard id="header-scrolled" label="Header · scrolled (border visible)" width={780} height={140}>
          <Screen tab="sets" notifications={0} headerOnly scrolled/>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
